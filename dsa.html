<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA 210 · THE BLACK ARCHIVE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg: #050505;
            --surface: #0f0f0f;
            --border: #1a1a1a;
            --accent: #ffffff;
            --accent-dim: #666666;
            --gold: #d4af37;
            --red: #ff3333;
            --green: #00ff66;
            --font-main: 'Space+Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg);
            color: var(--accent);
            font-family: var(--font-main);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- BACKGROUND MESH --- */
        .bg-mesh {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at var(--x, 50%) var(--y, 50%), black, transparent 80%);
            z-index: -1;
            opacity: 0.5;
        }

        /* --- LAYOUT --- */
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 40px;
        }

        header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .logo { font-size: 2.5rem; font-weight: 700; letter-spacing: -2px; }
        .logo span { color: var(--accent-dim); }

        /* --- SIDEBAR CARDS --- */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 4px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        .card:hover { border-color: var(--accent-dim); }
        .card-label { font-size: 0.7rem; color: var(--accent-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }
        
        .rank-value { font-size: 1.8rem; font-weight: 700; margin-bottom: 5px; }
        .xp-bar-bg { height: 2px; background: var(--border); width: 100%; position: relative; }
        .xp-bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 1s; }

        /* --- THE GRID --- */
        .grid-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .days-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(35px, 1fr));
            gap: 8px;
        }
        .day {
            aspect-ratio: 1;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-family: var(--font-mono);
            cursor: pointer;
            transition: 0.2s;
            color: var(--accent-dim);
        }
        .day:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        .day.filled { background: var(--accent); color: var(--bg); border: none; font-weight: bold; }
        .day.milestone { border: 1px solid var(--gold); color: var(--gold); }

        /* --- MODAL --- */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }
        .modal-inner {
            background: var(--surface);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            position: relative;
        }
        .close-btn { position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--accent-dim); cursor: pointer; font-size: 1.2rem; }
        
        .entry-row { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        input, select {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 12px;
            width: 100%;
            margin-top: 8px;
            font-family: var(--font-mono);
            border-radius: 0;
        }
        input:focus { border-color: var(--accent); outline: none; }

        .btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 15px 30px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .btn-add { background: transparent; border: 1px solid var(--accent-dim); color: var(--accent); font-size: 0.8rem; margin-top: 0; }
        
        /* --- FLASH ANIMATION --- */
        #flash-overlay {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
        }
        .impact-msg {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8rem;
            font-weight: 900;
            z-index: 1001;
            pointer-events: none;
            opacity: 0;
            letter-spacing: -10px;
            white-space: nowrap;
        }

        @media (max-width: 900px) {
            .dashboard { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="bg-mesh" id="mesh"></div>
<div id="flash-overlay"></div>
<div class="impact-msg" id="impact-text">DAY COMPLETE</div>

<div class="dashboard">
    <header>
        <div class="logo">EgoHurt<span>210</span></div>
        <div id="real-time" style="font-family: var(--font-mono); font-size: 0.8rem; color: var(--accent-dim);">00:00:00</div>
    </header>

    <aside>
        <div class="card">
            <span class="card-label">Current Phase</span>
            <div class="rank-value" id="rank-name">PHASE 0</div>
            <div class="xp-bar-bg"><div class="xp-bar-fill" id="xp-fill"></div></div>
            <p id="rank-hint" style="font-size: 0.7rem; color: var(--accent-dim); margin-top: 10px;">0 DAYS REMAINING</p>
        </div>

        <div class="card">
            <span class="card-label">Total Volume</span>
            <div class="rank-value" id="total-solved">0</div>
            <div style="display: flex; justify-content: space-between; margin-top: 15px; font-size: 0.8rem;">
                <span>LC: <b id="lc-count">0</b></span>
                <span>CC: <b id="cc-count">0</b></span>
                <span>GFG: <b id="gfg-count">0</b></span>
            </div>
        </div>

        <div class="card">
            <span class="card-label">Current Streak</span>
            <div class="rank-value" id="streak-val">0</div>
        </div>

        <button class="btn" style="background: transparent; border: 1px solid var(--red); color: var(--red); font-size: 0.7rem;" onclick="resetTimeline()">Wipe Timeline</button>
        <button class="btn" style="background: transparent; border: 1px solid var(--accent-dim); color: var(--accent-dim); font-size: 0.7rem; margin-top: 10px;" onclick="exportData()">Export Save</button>
    </aside>

    <main>
        <div class="grid-header">
            <h3>210 DAY PROGRESSION</h3>
            <div id="pct-complete" style="font-family: var(--font-mono); color: var(--accent-dim);">0%</div>
        </div>
        <div class="days-grid" id="grid"></div>
    </main>
</div>

<div class="modal" id="modal">
    <div class="modal-inner">
        <button class="close-btn" onclick="closeModal()">✕</button>
        <h2 id="modal-title" style="margin-bottom: 30px; letter-spacing: -1px;">LOG DAY 0</h2>
        
        <div id="entry-container"></div>
        
        <button class="btn btn-add" onclick="createRow()">+ Add Problem</button>
        <button class="btn" onclick="saveData()">Update Record</button>
    </div>
</div>

<script>
    // State
    let db = JSON.parse(localStorage.getItem('odyssey_210')) || {};
    let activeDay = null;

    const PHASES = [
        { min: 0, name: "Phase 0: Void", limit: 1 },
        { min: 1, name: "Phase I: Genesis", limit: 7 },
        { min: 7, name: "Phase II: Kinetic", limit: 21 },
        { min: 21, name: "Phase III: Elite", limit: 50 },
        { min: 50, name: "Phase IV: Master", limit: 100 },
        { min: 100, name: "Phase V: Legend", limit: 210 }
    ];

    // Mouse mesh effect
    window.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth) * 100;
        const y = (e.clientY / window.innerHeight) * 100;
        document.getElementById('mesh').style.setProperty('--x', `${x}%`);
        document.getElementById('mesh').style.setProperty('--y', `${y}%`);
    });

    // Time
    setInterval(() => {
        document.getElementById('real-time').innerText = new Date().toLocaleTimeString();
    }, 1000);

    // Initialize
    function init() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for (let i = 1; i <= 210; i++) {
            const div = document.createElement('div');
            div.className = 'day' + (db[i] ? ' filled' : '') + (i % 30 === 0 ? ' milestone' : '');
            div.innerText = i;
            div.onclick = () => openModal(i);
            grid.appendChild(div);
        }
        updateDashboard();
    }

    function openModal(day) {
        activeDay = day;
        document.getElementById('modal-title').innerText = `LOG DAY ${day}`;
        document.getElementById('entry-container').innerHTML = '';
        
        const existing = db[day] || [];
        if (existing.length === 0) createRow();
        else existing.forEach(p => createRow(p.platform, p.name, p.link));
        
        document.getElementById('modal').style.display = 'flex';
        gsap.from(".modal-inner", { y: 20, opacity: 0, duration: 0.4 });
    }

    function createRow(plt = 'LeetCode', nm = '', ln = '') {
        const div = document.createElement('div');
        div.className = 'entry-row';
        div.innerHTML = `
            <select class="p-plt">
                <option ${plt==='LeetCode'?'selected':''}>LeetCode</option>
                <option ${plt==='CodeChef'?'selected':''}>CodeChef</option>
                <option ${plt==='GFG'?'selected':''}>GFG</option>
            </select>
            <input type="text" placeholder="Problem Name" class="p-nm" value="${nm}">
            <input type="text" placeholder="Mandatory URL" class="p-ln" value="${ln}">
        `;
        document.getElementById('entry-container').appendChild(div);
    }

    function saveData() {
        const rows = document.querySelectorAll('.entry-row');
        let data = [];
        let valid = true;

        rows.forEach(row => {
            const name = row.querySelector('.p-nm').value;
            const link = row.querySelector('.p-ln').value;
            if (name && !link) {
                alert("Links are mandatory for every problem!");
                valid = false;
            } else if (name && link) {
                data.push({
                    platform: row.querySelector('.p-plt').value,
                    name: name,
                    link: link
                });
            }
        });

        if (!valid) return;

        const isNew = !db[activeDay] && data.length > 0;
        if (data.length > 0) db[activeDay] = data;
        else delete db[activeDay];

        localStorage.setItem('odyssey_210', JSON.stringify(db));
        if (isNew) triggerSupernova();
        
        closeModal();
        init();
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }

    function triggerSupernova() {
        const flash = document.getElementById('flash-overlay');
        const text = document.getElementById('impact-text');
        
        const tl = gsap.timeline();
        tl.to(flash, { opacity: 1, duration: 0.1 })
          .to(flash, { opacity: 0, duration: 0.8 })
          .fromTo(text, { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1, duration: 0.4, ease: "expo.out" }, "-=0.6")
          .to(text, { opacity: 0, scale: 1.5, duration: 0.4, ease: "expo.in" });

        confetti({
            particleCount: 100,
            spread: 160,
            colors: ['#ffffff', '#333333'],
            origin: { y: 0.5 }
        });
    }

    function updateDashboard() {
        const keys = Object.keys(db).map(Number).sort((a,b)=>a-b);
        const allProblems = Object.values(db).flat();
        
        document.getElementById('total-solved').innerText = allProblems.length;
        document.getElementById('lc-count').innerText = allProblems.filter(p=>p.platform==='LeetCode').length;
        document.getElementById('cc-count').innerText = allProblems.filter(p=>p.platform==='CodeChef').length;
        document.getElementById('gfg-count').innerText = allProblems.filter(p=>p.platform==='GFG').length;
        document.getElementById('pct-complete').innerText = Math.round((keys.length/210)*100) + '%';

        // Streak
        let streak = 0;
        if(keys.length > 0) {
            let cur = 1;
            for(let i=0; i<keys.length; i++) {
                if(keys[i+1] === keys[i]+1) cur++;
                else { streak = Math.max(streak, cur); cur = 1; }
            }
            streak = Math.max(streak, cur);
        }
        document.getElementById('streak-val').innerText = streak;

        // Phases
        let curPhase = PHASES[0];
        let nxtPhase = PHASES[1];
        for(let p of PHASES) {
            if(streak >= p.min) {
                curPhase = p;
                nxtPhase = PHASES[PHASES.indexOf(p)+1] || p;
            }
        }
        document.getElementById('rank-name').innerText = curPhase.name;
        const progress = ((streak - curPhase.min) / (nxtPhase.limit - curPhase.min || 1)) * 100;
        document.getElementById('xp-fill').style.width = Math.min(progress, 100) + '%';
        document.getElementById('rank-hint').innerText = `${nxtPhase.limit - streak} DAYS TO NEXT PHASE`;
    }

    function resetTimeline() {
        if(confirm("Are you sure you want to wipe all records?")) {
            db = {};
            localStorage.clear();
            init();
        }
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(db)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'DSA_ODYSSEY_SAVE.json';
        a.click();
    }

    init();
</script>
</body>
</html>
