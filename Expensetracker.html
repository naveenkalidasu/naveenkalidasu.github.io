<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project-3</title>
    <style>
        .main{
            border: 2px solid green;
            background-color: green;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            border-radius: 16px;
            width: 600px;
            margin: 150px;
            margin-left: 400px;
        }
        input{
            width: 200px;
            padding: 10px;
            border-radius: 16px;
        }
        button{
            border: 2px solid blue;
            border-radius: 16px;
            width: 100px;
            padding: 10px;
            background-color: blue;
            color: white;
        }
        ul{
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="main">
        <h1>Expense Tracker</h1>
        <div class="row">
            <input type="text" placeholder="Enter a Expense" id="expense">
            <input type="number" placeholder=" Enter a amount" id="amount">
            <button onclick="add()">Add</button>
        </div>
        <h2 id="total"></h2>
        <ul id="items"></ul>
    </div>
    
    <script>
         let total=0;
        function add(){
            let expense=document.getElementById('expense').value;
            let amount=document.getElementById('amount').value;
            if(expense==" " || amount=="")
                {
                    alert("Enter both Feilds");
                }
            let item=document.createElement("li");
            item.innerText=expense+"-"+"₹"+amount;
            amount=Number(amount);
            total=total+amount;
            document.getElementById('total').innerText="Total:₹"+total;
            document.getElementById('items').appendChild(item);
            
        }
    </script>
</body>
</html>
