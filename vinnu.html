<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ Birthday Surprise ✨</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0010;
            color: #fff;
            overflow-x: hidden;
            cursor: default;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1a0a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #ff4d8d;
            border-radius: 12px;
        }

        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
            padding: 3rem 1.5rem;
            position: relative;
            overflow: hidden;
            animation: fadeInPage 1.2s ease forwards;
        }

        @keyframes fadeInPage {
            0% {
                opacity: 0;
                transform: scale(0.98);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .page.active {
            display: flex;
        }

        .btn-glow {
            background: linear-gradient(135deg, #ff4d8d, #ff85a2);
            border: none;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            padding: 1rem 2.8rem;
            border-radius: 60px;
            box-shadow: 0 8px 30px rgba(255, 77, 141, 0.4);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            position: relative;
            overflow: hidden;
            z-index: 10;
        }

        .btn-glow::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 60%);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .btn-glow:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(255, 77, 141, 0.7);
        }

        .particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .float-item {
            position: absolute;
            opacity: 0.2;
            font-size: 1.5rem;
            animation: floatUp linear infinite;
            user-select: none;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.4;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-20vh) rotate(360deg);
                opacity: 0;
            }
        }

        #cursor-glow {
            position: fixed;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(255, 77, 141, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            mix-blend-mode: screen;
            transition: all 0.08s ease;
        }

        /* PAGE 1 */
        #page1 .loader-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.8rem;
            text-align: center;
            z-index: 2;
        }

        .loader-content h2 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.2rem;
            background: linear-gradient(135deg, #ffb3c6, #ff85a2, #ff4d8d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 400;
            animation: pulseText 2s ease-in-out infinite;
        }

        @keyframes pulseText {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
        }

        .loader-content .big-emoji {
            font-size: 4rem;
            animation: bounce 1.5s ease infinite;
        }

        @keyframes bounce {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        /* PAGE 2 */
        #page2 h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4.5rem;
            font-weight: 400;
            text-shadow: 0 0 40px #ff4d8d, 0 0 80px #ff4d8d33;
            text-align: center;
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%,
            100% {
                text-shadow: 0 0 40px #ff4d8d, 0 0 80px #ff4d8d33;
            }
            50% {
                text-shadow: 0 0 60px #ff4d8d, 0 0 120px #ff4d8d55;
            }
        }

        #page2 .sub-greeting {
            font-size: 1.8rem;
            font-weight: 300;
            color: #ffb3c6;
            margin: 0.5rem 0 1.5rem;
            font-style: italic;
            letter-spacing: 1px;
        }

        .cake-container {
            font-size: 6rem;
            filter: drop-shadow(0 15px 30px #ff4d8d44);
            margin: 0.5rem 0;
            animation: floatCake 3s ease-in-out infinite;
        }

        @keyframes floatCake {
            0%,
            100% {
                transform: translateY(0) rotate(-2deg);
            }
            50% {
                transform: translateY(-10px) rotate(2deg);
            }
        }

        /* PAGE 3 - MEMORIES */
        #page3 {
            min-height: 200vh;
            padding-top: 4rem;
        }

        #page3 h2 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: #ffb3c6;
            margin-bottom: 2rem;
            text-shadow: 0 0 30px #ff4d8d33;
        }

        .memory-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
            width: 100%;
            max-width: 600px;
            margin: 1.5rem 0;
        }

        .memory-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: translateY(50px) scale(0.95);
            width: 100%;
        }

        .memory-card.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .memory-card:hover {
            transform: scale(1.02) translateY(-5px);
            box-shadow: 0 25px 50px rgba(255, 77, 141, 0.2);
            border-color: #ff85a266;
        }

        .memory-card img {
            width: 100%;
            aspect-ratio: 16/10;
            object-fit: cover;
            border-radius: 24px;
            background: #220f1a;
        }

        .memory-card .caption {
            font-size: 1rem;
            color: #ffb3c6;
            margin-top: 0.8rem;
            text-align: center;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .memory-card .quote-overlay {
            margin-top: 0.5rem;
            font-family: 'Great Vibes', cursive;
            font-size: 1.2rem;
            color: #ff85a2;
            text-align: center;
            opacity: 0.7;
        }

        .gift-trigger-btn {
            margin: 3rem 0 2rem;
            animation: giftPulse 2s ease-in-out infinite;
        }

        @keyframes giftPulse {
            0%,
            100% {
                box-shadow: 0 0 50px #ff4d8d44;
            }
            50% {
                box-shadow: 0 0 80px #ff4d8d88;
            }
        }

        /* PAGE 4 - PROMISES */
        #page4 {
            min-height: 200vh;
            padding-top: 4rem;
        }

        #page4 h2 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: #ffb3c6;
            text-shadow: 0 0 30px #ff4d8d33;
            margin-bottom: 2rem;
        }

        .promises-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            max-width: 700px;
        }

        .promise-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 40px;
            padding: 1.6rem 2.2rem;
            max-width: 600px;
            width: 100%;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
            transform: translateY(40px) scale(0.95);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .promise-card.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .promise-card:hover {
            border-color: #ff4d8d66;
            box-shadow: 0 0 40px #ff4d8d22;
        }

        .promise-card .heart-icon {
            color: #ff4d8d;
            margin-right: 12px;
            display: inline-block;
            animation: heartBeat 1.5s ease-in-out infinite;
        }

        @keyframes heartBeat {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }

        .promise-card p {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #f0e0e6;
            font-weight: 300;
        }

        .forever-love {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: #ff4d8d;
            margin: 2rem 0;
            opacity: 0;
            transition: all 1.5s ease;
            text-shadow: 0 0 40px #ff4d8d44;
        }

        .forever-love.show {
            opacity: 1;
            animation: glowPulse 2s ease-in-out infinite;
        }

        .final-letter-btn {
            margin: 2rem 0;
            animation: giftPulse 2s ease-in-out infinite;
        }

        /* PAGE 5 - FINAL LETTER */
        #page5 {
            min-height: 100vh;
            padding: 2rem;
            background: radial-gradient(ellipse at center, #1a0a2a 0%, #0b0010 100%);
        }

        .letter-wrapper {
            position: relative;
            width: 100%;
            max-width: 700px;
            perspective: 1200px;
        }

        .letter-envelope {
            position: relative;
            width: 100%;
            min-height: 500px;
            background: linear-gradient(145deg, #1a0a1a, #2d0f1f);
            border-radius: 32px;
            border: 2px solid rgba(255, 215, 0, 0.15);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), 0 0 60px rgba(255, 77, 141, 0.05);
            overflow: hidden;
            transform-style: preserve-3d;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .letter-envelope::before {
            content: '✉️';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8rem;
            opacity: 0.05;
            z-index: 1;
        }

        .letter-envelope::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 1px solid rgba(255, 215, 0, 0.05);
            border-radius: 24px;
            pointer-events: none;
        }

        .letter-envelope .seal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 40% 40%, #ff4d8d, #b82a5e);
            border-radius: 50%;
            box-shadow: 0 0 60px #ff4d8d44, inset 0 -4px 20px rgba(0, 0, 0, 0.3);
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            border: 3px solid rgba(255, 215, 0, 0.3);
        }

        .letter-envelope .seal:hover {
            transform: translate(-50%, -50%) scale(1.08);
            box-shadow: 0 0 80px #ff4d8d88;
        }

        .letter-envelope .seal.opened {
            transform: translate(-50%, -50%) scale(0) rotate(180deg);
            opacity: 0;
            pointer-events: none;
        }

        .letter-content {
            padding: 3rem 2.8rem;
            opacity: 0;
            transform: translateY(40px) scale(0.95) rotateX(-10deg);
            transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 3;
            min-height: 400px;
            background: linear-gradient(180deg, rgba(30, 10, 25, 0.6), rgba(10, 0, 15, 0.8));
            border-radius: 28px;
            margin: 8px;
        }

        .letter-content.opened {
            opacity: 1;
            transform: translateY(0) scale(1) rotateX(0deg);
        }

        .letter-content::before,
        .letter-content::after {
            content: '✦';
            position: absolute;
            color: rgba(255, 215, 0, 0.15);
            font-size: 1.5rem;
        }
        .letter-content::before {
            top: 20px;
            left: 25px;
        }
        .letter-content::after {
            bottom: 20px;
            right: 25px;
        }

        .letter-content .typing-message {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            line-height: 2.1;
            color: #f5e6ed;
            min-height: 200px;
            padding: 0.5rem 0;
        }

        .letter-content .typing-message .highlight {
            color: #ff85a2;
            font-weight: 700;
        }

        .letter-content .signature {
            font-family: 'Great Vibes', cursive;
            font-size: 2.8rem;
            color: #ffb3c6;
            margin-top: 2rem;
            text-align: right;
            opacity: 0;
            transition: opacity 1.2s ease 1.5s;
            padding-right: 0.5rem;
        }
        

        .letter-content .signature.show {
            opacity: 1;
        }

        .letter-content .signature span {
            color: #ff4d8d;
        }

        .sparkle-burst {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
        }

        .sparkle-burst span {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ffd700;
            border-radius: 50%;
            animation: sparkleFly 1.2s ease-out forwards;
        }

        @keyframes sparkleFly {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }

        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .music-control {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 0.6rem 1.2rem;
            color: #ffb3c6;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .music-control:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
        }

        .volume-control {
            position: fixed;
            bottom: 80px;
            right: 30px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 0.4rem 1rem;
            opacity: 0;
            transition: all 0.3s;
        }

        .volume-control.show {
            opacity: 1;
        }

        .volume-control input[type="range"] {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            background: linear-gradient(to right, #ff4d8d, #ff85a2);
            border-radius: 2px;
            outline: none;
        }

        .volume-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ff4d8d;
            cursor: pointer;
            box-shadow: 0 0 20px #ff4d8d44;
        }

        @media (max-width: 768px) {
            #page2 h1 {
                font-size: 3.2rem;
            }
            .loader-content h2 {
                font-size: 2.4rem;
            }
            .promise-card {
                padding: 1.2rem 1.5rem;
            }
            .promise-card p {
                font-size: 0.95rem;
            }
            .letter-content {
                padding: 2rem 1.5rem;
            }
            .letter-content .typing-message {
                font-size: 1.1rem;
            }
            .btn-glow {
                font-size: 1rem;
                padding: 0.8rem 2rem;
            }
            .cake-container {
                font-size: 4.5rem;
            }
            #page2 .sub-greeting {
                font-size: 1.3rem;
            }
            .music-control {
                bottom: 20px;
                right: 20px;
                font-size: 0.8rem;
                padding: 0.5rem 1rem;
            }
            .volume-control {
                bottom: 70px;
                right: 20px;
                padding: 0.3rem 0.8rem;
            }
            .volume-control input[type="range"] {
                width: 60px;
            }
            .letter-envelope .seal {
                width: 80px;
                height: 80px;
                font-size: 2.5rem;
            }
        }

        @media (max-width: 480px) {
            #page4 h2 {
                font-size: 2.8rem;
            }
            .forever-love {
                font-size: 2.8rem;
            }
            .letter-content .signature {
                font-size: 2rem;
            }
            .letter-envelope .seal {
                width: 70px;
                height: 70px;
                font-size: 2rem;
            }
            .letter-content .typing-message {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div id="cursor-glow"></div>
    <div class="particle-container" id="particleContainer"></div>
    <canvas id="fireworks-canvas"></canvas>

    <div class="music-control" id="musicToggle">🎵 Play Music</div>
    <div class="volume-control" id="volumeControl">
        <span style="font-size:0.8rem;">🔊</span>
        <input type="range" id="volumeSlider" min="0" max="100" value="70">
    </div>

    <!-- PAGE 1 -->
    <div id="page1" class="page active">
        <div class="loader-content">
            <div class="big-emoji">🎉</div>
            <h2>Someone Special Has a Surprise Waiting...</h2>
            <div style="font-size: 2rem; letter-spacing: 8px;">✨</div>
            <button class="btn-glow" id="btnSurprise">Open Your Birthday Surprise ❤️</button>
        </div>
    </div>

    <!-- PAGE 2 -->
    <div id="page2" class="page">
        <h1>🎂 Happy Birthday My Love ❤️</h1>
        <div class="sub-greeting">✨ You are the most beautiful part of my life. ✨</div>
        <div class="cake-container">🎂</div>
        <button class="btn-glow" id="gotoMemories">View Our Memories ❤️</button>
    </div>

    <!-- PAGE 3 - MEMORIES -->
    <div id="page3" class="page">
        <h2>Our Memories</h2>
        <div class="memory-grid" id="memoryGrid"></div>
        <button class="btn-glow gift-trigger-btn" id="giftTriggerBtn">🎁 Open Your Gift (Promises) ❤️</button>
    </div>

    <!-- PAGE 4 - PROMISES -->
    <div id="page4" class="page">
        <h2>My Promises ❤️</h2>
        <div class="promises-wrapper" id="promisesContainer"></div>
        <div class="forever-love" id="foreverLove">I Love You Forever ❤️</div>
        <button class="btn-glow final-letter-btn" id="finalLetterBtn">💌 Read My Final Letter</button>
    </div>

    <!-- PAGE 5 - FINAL LETTER -->
    <div id="page5" class="page">
        <div class="letter-wrapper">
            <div class="letter-envelope" id="letterEnvelope">
                <div class="seal" id="letterSeal">💝</div>
                <div class="letter-content" id="letterContent">
                    <div class="typing-message" id="typingMessage"></div>
                    <div class="signature" id="signature">— Yours Forever, <span>Naveen</span> ❤️</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ================================================================
        // LOCAL IMAGES - CHANGE THESE TO YOUR IMAGE PATHS
        // ================================================================
        // Place your images in the same folder as this HTML file
        // Name them: pic1.jpg, pic2.jpg, pic3.jpg, pic4.jpg, pic5.jpg, pic6.jpg
        // Or update the paths below to match your image locations
        
        const memoryImages = [
            { src: 'pic1.jpeg', cap: 'First walk together', quote: 'Every step with you is magic' },
            { src: 'pic2.jpeg', cap: 'Sunset memories', quote: 'You light up my world' },
            { src: 'pic3.jpeg', cap: 'Laughing together', quote: 'Your smile is my sunshine' },
            { src: 'pic4.jpeg', cap: 'Always us', quote: 'Forever in my heart' },
            { src: 'pic5.jpeg', cap: 'Beautiful moments', quote: 'Every moment is precious' },
            { src: 'pic6.jpeg', cap: 'Forever love', quote: 'You are my everything' },
        ];

        // ================================================================
        // PARTICLES
        // ================================================================
        const particleContainer = document.getElementById('particleContainer');
        const symbols = ['❤️', '✨', '🌹', '⭐', '💫', '🌸'];

        function createParticles() {
            for (let i = 0; i < 30; i++) {
                const el = document.createElement('div');
                el.className = 'float-item';
                el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                el.style.left = Math.random() * 100 + '%';
                el.style.fontSize = (1 + Math.random() * 2) + 'rem';
                el.style.animationDuration = (20 + Math.random() * 30) + 's';
                el.style.animationDelay = (Math.random() * 25) + 's';
                el.style.opacity = 0.15 + Math.random() * 0.3;
                particleContainer.appendChild(el);
            }
        }
        createParticles();

        // ================================================================
        // CURSOR
        // ================================================================
        const glow = document.getElementById('cursor-glow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        // ================================================================
        // PAGE NAVIGATION
        // ================================================================
        const pages = {
            p1: document.getElementById('page1'),
            p2: document.getElementById('page2'),
            p3: document.getElementById('page3'),
            p4: document.getElementById('page4'),
            p5: document.getElementById('page5'),
        };

        let currentPage = 1;

        function showPage(pageId) {
            Object.values(pages).forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');

            if (pageId === 'page1') currentPage = 1;
            else if (pageId === 'page2') currentPage = 2;
            else if (pageId === 'page3') {
                currentPage = 3;
                initMemories();
                setTimeout(() => {
                    document.getElementById('page3').scrollIntoView({ behavior: 'smooth' });
                }, 300);
            } else if (pageId === 'page4') {
                currentPage = 4;
                initPromises();
            } else if (pageId === 'page5') {
                currentPage = 5;
                startFireworks();
            }
        }

        // ================================================================
        // PAGE 1 → PAGE 2
        // ================================================================
        document.getElementById('btnSurprise').addEventListener('click', () => {
            showPage('page2');
            launchConfetti(30);
        });

        // ================================================================
        // PAGE 2 → PAGE 3
        // ================================================================
        document.getElementById('gotoMemories').addEventListener('click', () => {
            showPage('page3');
        });

        // ================================================================
        // MEMORIES WITH LOCAL IMAGES
        // ================================================================
        let memoriesInitialized = false;
        let memoryObserver = null;

        function initMemories() {
            if (memoriesInitialized) return;
            memoriesInitialized = true;

            const grid = document.getElementById('memoryGrid');
            
            // Check if images exist, if not show placeholder with error handling
            memoryImages.forEach((m, i) => {
                const card = document.createElement('div');
                card.className = 'memory-card';
                card.dataset.index = i;
                card.innerHTML = `
                        <img src="${m.src}" alt="${m.cap}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22300%22%3E%3Crect fill=%22%23220f1a%22 width=%22400%22 height=%22300%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 fill=%22%23ffb3c6%22 font-size=%2220%22 font-family=%22Arial%22%3E📸 Photo ${i+1}%3C/text%3E%3C/svg%3E'">
                        <div class="caption">${m.cap}</div>
                        <div class="quote-overlay">✨ ${m.quote}</div>
                    `;
                grid.appendChild(card);
            });

            memoryObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.3 });

            document.querySelectorAll('.memory-card').forEach(card => {
                memoryObserver.observe(card);
            });
        }

        // ================================================================
        // PAGE 3 → PAGE 4
        // ================================================================
        document.getElementById('giftTriggerBtn').addEventListener('click', () => {
            showPage('page4');
            launchConfetti(40);
        });

        // ================================================================
        // PROMISES
        // ================================================================
        const promises = [
            "Ma nenu inka ika nundi nee maata vintanu. Nuvvu eppudaina okasari 'Naveen' ani gattiga piliste chaalu... Aa kshanam nundi nee maata vintanu. Idhi naa promise.",
            "Neku nachani panulu nenu cheyanu. Okavela teliyakunda chesthe... Nuvvu cheppina ventane aapestha.",
            "Nee kantlo nundi oka drop water kuda naa valla raakunda chusukunta.",
            "Baga chadhuvukunta. Pedda job techukunta. Idhi naa promise.",
            "Ninnu entha baga chuskuntano teliyadhu... Kaani eppudu baadha pettanu.",
            "Eppatiki nenu neethone unta. Future lo emaina dooram vachina... Nee memories tho bathikestha. Vere ammayi naa life lo eppudu undadhu."
        ];

        let promisesInitialized = false;
        let promiseObserver = null;

        function initPromises() {
            if (promisesInitialized) return;
            promisesInitialized = true;

            const container = document.getElementById('promisesContainer');
            promises.forEach((text, idx) => {
                const card = document.createElement('div');
                card.className = 'promise-card';
                card.dataset.index = idx;
                card.innerHTML = `
                        <p>
                            <span class="heart-icon">❤️</span> 
                            Promise ${idx + 1}: ${text}
                        </p>
                    `;
                container.appendChild(card);
            });

            promiseObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.3 });

            document.querySelectorAll('.promise-card').forEach(card => {
                promiseObserver.observe(card);
            });

            let revealedCount = 0;
            const checkAllRevealed = setInterval(() => {
                const visible = document.querySelectorAll('.promise-card.visible').length;
                if (visible === promises.length) {
                    clearInterval(checkAllRevealed);
                    setTimeout(() => {
                        document.getElementById('foreverLove').classList.add('show');
                        launchConfetti(30);
                    }, 500);
                }
            }, 500);
        }

        // ================================================================
        // PAGE 4 → PAGE 5
        // ================================================================
        document.getElementById('finalLetterBtn').addEventListener('click', () => {
            showPage('page5');
            launchConfetti(30);
            setTimeout(() => {
                openLetter();
            }, 1000);
        });

        // ================================================================
        // LETTER OPENING
        // ================================================================
        let letterOpened = false;

        function openLetter() {
            if (letterOpened) return;
            letterOpened = true;

            const seal = document.getElementById('letterSeal');
            const content = document.getElementById('letterContent');

            seal.classList.add('opened');
            createGentleSparkles();

            setTimeout(() => {
                content.classList.add('opened');
                startTypewriter();
                setTimeout(() => {
                    document.getElementById('signature').classList.add('show');
                    launchConfetti(20);
                }, 7000);
            }, 500);

            setTimeout(() => {
                startFireworks();
            }, 800);
        }

        function createGentleSparkles() {
            const container = document.createElement('div');
            container.className = 'sparkle-burst';
            const rect = document.getElementById('letterSeal').getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;

            for (let i = 0; i < 20; i++) {
                const span = document.createElement('span');
                const angle = Math.random() * 2 * Math.PI;
                const distance = 30 + Math.random() * 80;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance - 30;
                span.style.cssText = `
                        position: absolute;
                        left: ${cx}px;
                        top: ${cy}px;
                        width: ${3 + Math.random() * 4}px;
                        height: ${3 + Math.random() * 4}px;
                        background: ${['#ffd700', '#ff4d8d', '#ff85a2', '#ffffff'][Math.floor(Math.random() * 4)]};
                        border-radius: 50%;
                        --tx: ${tx}px;
                        --ty: ${ty}px;
                        animation: sparkleFly ${0.8 + Math.random() * 0.6}s ease-out forwards;
                        animation-delay: ${Math.random() * 0.2}s;
                        box-shadow: 0 0 10px ${['#ffd700', '#ff4d8d', '#ff85a2'][Math.floor(Math.random() * 3)]}44;
                    `;
                container.appendChild(span);
            }
            document.body.appendChild(container);
            setTimeout(() => container.remove(), 1500);
        }

        // ================================================================
        // TYPEWRITER
        // ================================================================
        let typewriterDone = false;

        function startTypewriter() {
            if (typewriterDone) return;
            typewriterDone = true;

            const el = document.getElementById('typingMessage');
            const lines = [
                "Wishhh You Very Very Very Very Happy Birthday Maa ❤️🎂",
                "",
                "You are my biggest happiness.",
                "Thank you for coming into my life.",
                "",
                "No matter what happens...",
                "I will always pray for your happiness.",
                "I promise to become someone you will always be proud of.",
                "",
                "You are my smile,",
                "my peace,",
                "my happiness,",
                "my everything.",
                "",
                "Happy Birthday once again my love ❤️"
            ];

            let lineIdx = 0;
            let charIdx = 0;
            let currentText = '';

            function typeLine() {
                if (lineIdx >= lines.length) {
                    el.innerHTML += '<span style="opacity:0.3;">|</span>';
                    return;
                }

                const fullLine = lines[lineIdx];
                if (charIdx < fullLine.length) {
                    currentText += fullLine[charIdx];
                    el.innerHTML = currentText + '<span style="opacity:0.3;">|</span>';
                    charIdx++;
                    setTimeout(typeLine, 20 + Math.random() * 12);
                } else {
                    currentText += '<br>';
                    el.innerHTML = currentText;
                    lineIdx++;
                    charIdx = 0;
                    setTimeout(typeLine, 200);
                }
            }

            typeLine();
        }

        // ================================================================
        // CONFETTI
        // ================================================================
        function launchConfetti(count = 20) {
            const colors = ['#ff4d8d', '#ff85a2', '#ffb3c6', '#ffffff', '#ffd700'];

            for (let i = 0; i < count; i++) {
                const c = document.createElement('div');
                const size = 4 + Math.random() * 8;
                c.style.cssText = `
                        position: fixed;
                        width: ${size}px;
                        height: ${size * (0.5 + Math.random() * 0.5)}px;
                        background: ${colors[Math.floor(Math.random() * colors.length)]};
                        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
                        left: ${Math.random() * 100}%;
                        top: -10px;
                        z-index: 9999;
                        pointer-events: none;
                        transform: rotate(${Math.random() * 360}deg);
                        opacity: 0.8;
                    `;
                document.body.appendChild(c);

                const xMove = (Math.random() - 0.5) * 400;
                const yMove = 400 + Math.random() * 400;
                const rotation = Math.random() * 360;

                c.animate([
                    { transform: `translate(0,0) rotate(0deg)`, opacity: 0.9 },
                    { transform: `translate(${xMove}px, ${yMove}px) rotate(${rotation}deg)`, opacity: 0 }
                ], {
                    duration: 1000 + Math.random() * 800,
                    easing: 'cubic-bezier(0.2, 0.8, 0.3, 1)'
                }).onfinish = () => c.remove();
            }
        }

        // ================================================================
        // FIREWORKS
        // ================================================================
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        let fireworksActive = false;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class FireworkParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * 2 * Math.PI;
                const speed = 1.5 + Math.random() * 5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed - 1;
                this.life = 1;
                this.decay = 0.008 + Math.random() * 0.015;
                this.color = `hsl(${Math.random() * 60 + 320}, 85%, 60%)`;
                this.size = 1.5 + Math.random() * 3;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.03;
                this.life -= this.decay;
                return this.life > 0;
            }

            draw() {
                ctx.globalAlpha = this.life * 0.7;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        let fireworkParticles = [];

        function createFirework() {
            const x = Math.random() * canvas.width;
            const y = Math.random() * canvas.height * 0.4 + 0.1 * canvas.height;
            for (let i = 0; i < 30; i++) {
                fireworkParticles.push(new FireworkParticle(x, y));
            }
        }

        function animateFireworks() {
            if (!fireworksActive) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (Math.random() < 0.15) {
                createFirework();
            }

            fireworkParticles = fireworkParticles.filter(p => p.update());
            fireworkParticles.forEach(p => p.draw());

            requestAnimationFrame(animateFireworks);
        }

        function startFireworks() {
            if (fireworksActive) return;
            fireworksActive = true;
            animateFireworks();
            setInterval(() => {
                if (fireworksActive && Math.random() < 0.2) {
                    createFirework();
                }
            }, 800);
        }

        // ================================================================
        // MUSIC - HAPPY BIRTHDAY
        // ================================================================
        let audioCtx = null;
        let musicInterval = null;
        let isMusicPlaying = false;
        let volume = 0.7;

        const volumeSlider = document.getElementById('volumeSlider');
        const volumeControl = document.getElementById('volumeControl');

        const birthdayMelody = [
            523.25, 523.25, 587.33, 523.25, 659.25, 587.33,
            783.99, 783.99, 739.99, 659.25, 587.33, 523.25,
            880.00, 880.00, 783.99, 659.25, 783.99, 739.99,
            523.25, 523.25, 587.33, 523.25, 659.25, 587.33
        ];

        const durations = [
            0.5, 0.5, 0.5, 0.5, 0.5, 0.5,
            0.5, 0.5, 0.5, 0.5, 0.5, 0.5,
            0.5, 0.5, 0.5, 0.5, 0.5, 0.5,
            0.5, 0.5, 0.5, 0.5, 0.5, 0.5
        ];

        let melodyIndex = 0;
        let noteTimer = null;

        document.getElementById('musicToggle').addEventListener('click', function() {
            if (!audioCtx) {
                audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            }

            if (isMusicPlaying) {
                isMusicPlaying = false;
                clearInterval(musicInterval);
                if (noteTimer) {
                    clearTimeout(noteTimer);
                    noteTimer = null;
                }
                this.textContent = '🎵 Play Music';
                this.style.color = '#ffb3c6';
                volumeControl.classList.remove('show');
                return;
            }

            isMusicPlaying = true;
            this.textContent = '🔊 Music Playing';
            this.style.color = '#ff4d8d';
            volumeControl.classList.add('show');
            melodyIndex = 0;
            playBirthdayMelody();
        });

        function playBirthdayMelody() {
            if (!isMusicPlaying || melodyIndex >= birthdayMelody.length) {
                if (isMusicPlaying) {
                    melodyIndex = 0;
                    setTimeout(playBirthdayMelody, 1000);
                }
                return;
            }

            const freq = birthdayMelody[melodyIndex];
            const duration = durations[melodyIndex] * 0.4;
            playNote(freq, duration);

            melodyIndex++;
            noteTimer = setTimeout(playBirthdayMelody, duration * 1000 + 80);
        }

        function playNote(freq, duration) {
            if (!audioCtx || !isMusicPlaying) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.type = 'sine';
            osc.frequency.value = freq;

            const vol = volume * 0.12;
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(vol * 0.001, audioCtx.currentTime + duration);

            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + duration);

            if (melodyIndex % 3 === 0) {
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.type = 'sine';
                osc2.frequency.value = freq * 1.25;
                gain2.gain.setValueAtTime(vol * 0.25, audioCtx.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc2.start(audioCtx.currentTime);
                osc2.stop(audioCtx.currentTime + duration);
            }
        }

        volumeSlider.addEventListener('input', function() {
            volume = this.value / 100;
        });

        // ================================================================
        // INIT
        // ================================================================
        console.log('✨ Birthday Surprise ready!');
        console.log('📸 Please place your images as: pic1.jpg, pic2.jpg, pic3.jpg, pic4.jpg, pic5.jpg, pic6.jpg');

        initMemories();

        // Stars
        const style = document.createElement('style');
        style.textContent = `
                .star-twinkle {
                    animation: twinkle 2s ease-in-out infinite alternate;
                }
                @keyframes twinkle {
                    0% { opacity: 0.15; transform: scale(0.8); }
                    100% { opacity: 0.6; transform: scale(1.2); }
                }
            `;
        document.head.appendChild(style);

        for (let i = 0; i < 30; i++) {
            const star = document.createElement('div');
            star.style.cssText = `
                    position: fixed;
                    width: ${1.5 + Math.random() * 3}px;
                    height: ${1.5 + Math.random() * 3}px;
                    background: white;
                    border-radius: 50%;
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    opacity: ${0.1 + Math.random() * 0.4};
                    z-index: 0;
                    animation: twinkle ${1.5 + Math.random() * 2.5}s ease-in-out infinite alternate;
                    animation-delay: ${Math.random() * 3}s;
                    pointer-events: none;
                `;
            document.body.appendChild(star);
        }

        document.getElementById('letterSeal').addEventListener('click', openLetter);
    </script>
</body>
