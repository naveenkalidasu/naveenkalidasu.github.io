<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>practise</title>
    <style>
        body{
            background-color: rgb(0,0,25);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .main{
            width: 350px;
            height: 500px;
            background-color: gray;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        #name{
            animation:colorChange 10s linear infinite;
            transition: 0.4s;
        }
        
        @keyframes colorChange{
            0%{
                color: red;
                text-shadow:0 0 20px yellow,0 0 40px yellow,0 0 60px yellow
            }
            25%{
                color: blue;
                text-shadow:0 0 20px white,0 0 40px white,0 0 60px white;
            }
            50%{
                color: black;
                text-shadow:0 0 20px gold,0 0 40px gold,0 0 60px gold;
            }
            75%{
                color: greenyellow;
                text-shadow:0 0 20px black,0 0 40px black,0 0 60px black;

            }
            100%{
                color: red;
                text-shadow:0 0 20px yellow,0 0 40px yellow,0 0 60px yellow
            }

        }
        input,button{
            padding: 10px;
            border-radius: 10px;
            border-color: gray;
        }
        #output{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .output{
            width: 300px;
            min-height: 50px;
            background-color: black;
            color: gray;
            border-radius: 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        button{
            background-color:green;

        }
        .button{
            color: white;
            background-color: red;
        }
    </style>
</head>
<body>
    <div class="main">
        <h2 id="name">Habbit-Tracker</h2>
        <div class="things">
            <input type="text" placeholder="Enter the Task.." id="task">
            <button onclick="Add()" id="btn">Add</button>
        </div>
        <div id="output" >
        </div>
    </div>
    <script>
        let task=1;
        function Add(){
            let Task=document.getElementById('task').value;
            let div=document.createElement("div");
            div.innerText="Task"+task+":"+Task;
            div.className="output";
            document.getElementById('output').appendChild(div);
            document.getElementById('task').value="";
            task++;
            let btn=document.createElement("button");
            btn.innerText="Delete";
            btn.className="button"
            btn.onclick=function(){
            div.remove();   // your method
             }
             div.appendChild(btn);
        }
    </script>
</body>
</html>
