<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Birthday Surprise ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #0b0010;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            overflow: hidden;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            animation: fadeIn 1s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .heart {
            font-size: 5rem;
            animation: heartbeat 1.5s ease-in-out infinite;
            display: inline-block;
        }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        
        h1 {
            font-size: 2.8rem;
            margin: 1.5rem 0 1rem;
            background: linear-gradient(135deg, #ffb3c6, #ff4d8d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        p {
            color: #ffb3c6;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            opacity: 0.8;
            line-height: 1.6;
        }
        
        .loading-container {
            width: 100%;
            max-width: 400px;
            margin: 2rem auto;
        }
        
        .loading-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .loading-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff4d8d, #ff85a2);
            border-radius: 2px;
            animation: load 2.5s ease-in-out forwards;
        }
        
        @keyframes load {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        
        .loading-text {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            margin-top: 1rem;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        
        .btn {
            margin-top: 2.5rem;
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, #ff4d8d, #ff85a2);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 8px 30px rgba(255, 77, 141, 0.3);
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(255, 77, 141, 0.5);
        }
        
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }
        
        .particle {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.2;
            animation: float linear infinite;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.4; }
            90% { opacity: 0.3; }
            100% {
                transform: translateY(-20vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        .sparkle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: #ffd700;
            border-radius: 50%;
            pointer-events: none;
            animation: sparkleAnim 1s ease-out forwards;
        }
        
        @keyframes sparkleAnim {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(0);
            }
        }
        
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite alternate;
        }
        
        @keyframes twinkle {
            0% { opacity: 0.2; }
            100% { opacity: 0.8; }
        }
        
        .redirect-note {
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.8rem;
            margin-top: 2rem;
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .heart { font-size: 3.5rem; }
            .btn { padding: 0.8rem 2rem; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <div class="heart">❤️</div>
        <h1>Happy Birthday!</h1>
        <p>✨ A special surprise is waiting for you ✨</p>
        
        <div class="loading-container">
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
            <div class="loading-text">Loading your birthday experience...</div>
        </div>
        
        <a href="vinnu.html" class="btn" id="manualRedirect">
            🎉 Click Here to Open Your Surprise
        </a>
        
        <div class="redirect-note">✨ You'll be redirected automatically</div>
    </div>

    <script>
        // Create floating particles
        const symbols = ['❤️', '✨', '🌹', '⭐', '💫', '🌸', '🎂', '🎉', '💝', '🌟'];
        const container = document.getElementById('particles');
        
        for (let i = 0; i < 30; i++) {
            const el = document.createElement('div');
            el.className = 'particle';
            el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
            el.style.left = Math.random() * 100 + '%';
            el.style.fontSize = (1 + Math.random() * 2.5) + 'rem';
            el.style.animationDuration = (20 + Math.random() * 30) + 's';
            el.style.animationDelay = (Math.random() * 25) + 's';
            el.style.opacity = 0.15 + Math.random() * 0.3;
            container.appendChild(el);
        }

        // Create stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = (1 + Math.random() * 3) + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = (Math.random() * 3) + 's';
            star.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
            starsContainer.appendChild(star);
        }

        // Auto-redirect after 3 seconds
        setTimeout(() => {
            window.location.href = 'vinnu.html';
        }, 3000);

        // Create sparkles on hover
        document.querySelector('.btn').addEventListener('mouseenter', function(e) {
            for (let i = 0; i < 10; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = (e.clientX + (Math.random() - 0.5) * 100) + 'px';
                sparkle.style.top = (e.clientY + (Math.random() - 0.5) * 100) + 'px';
                sparkle.style.width = (2 + Math.random() * 4) + 'px';
                sparkle.style.height = sparkle.style.width;
                sparkle.style.background = ['#ffd700', '#ff4d8d', '#ff85a2', '#ffffff'][Math.floor(Math.random() * 4)];
                document.body.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 1000);
            }
        });

        console.log('✨ Redirecting to birthday surprise...');
    </script>
</body>
</html>
