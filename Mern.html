<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERN · 210 Days EgoHurt</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #06060a; --surface: #0c0c14; --surface2: #12121e; --border: #1e1e2e;
            --green: #00ed64; --blue: #61dbfb; --red: #ff4757; --amber: #ffb84d;
            --text: #f0f0f5; --text2: #8888aa; --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }
        
        .app { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
        .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 24px; display: flex; flex-direction: column; gap: 20px; }
        .main { padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, #12121e, #06060a); }
        
        .logo { font-size: 1.6rem; font-weight: 900; letter-spacing: -1.5px; font-family: 'JetBrains Mono'; }
        .logo span { color: var(--green); }
        
        .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
        .stat-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .stat-val { font-size: 2rem; font-weight: 900; font-family: 'JetBrains Mono'; color: var(--green); }
        
        .timeline { display: grid; grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 8px; grid-auto-flow: dense; }
        .day-box { height: 85px; border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-family: 'JetBrains Mono'; color: var(--text2); cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); background: var(--surface); text-align: center; padding: 5px; }
        .day-box:hover { border-color: var(--green); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,237,100,0.1); }
        .day-box.completed { background: linear-gradient(135deg, var(--green), #00c853); color: #000; font-weight: 800; border: none; }

        #impact, #streak-fire { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0; pointer-events: none; z-index: 2000; text-align: center; }
        #impact { font-size: 5rem; font-weight: 900; color: var(--green); text-shadow: 0 0 30px rgba(0,237,100,0.5); }
        #streak-fire { font-size: 8rem; filter: drop-shadow(0 0 30px #ff4757); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(10px); }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--surface); padding: 35px; border-radius: 20px; width: 420px; border: 1px solid var(--border); }
        .mbtn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; margin-top: 10px; font-family: 'Inter'; transition: 0.2s; }
        .mbtn.primary { background: var(--green); color: #000; }
        .mbtn.secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
        
        .field { margin-bottom: 15px; }
        .field label { display: block; font-size: 11px; color: var(--text2); text-transform: uppercase; margin-bottom: 5px; }
        .field input { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); color: #fff; border-radius: 8px; outline: none; font-family: 'JetBrains Mono'; }
    </style>
</head>
<body>

<div id="impact">DEPLOYED 🚀</div>
<div id="streak-fire">🔥 <div style="font-size: 2rem; color: #ffb84d; font-family: 'JetBrains Mono';" id="fire-val">STREAK 1</div></div>

<div class="app">
    <aside class="sidebar">
        <div class="logo">⚡ <span>Ego</span>Hurt</div>
        <div class="stat-card">
            <div class="stat-label">🔥 Current Streak</div>
            <div class="stat-val" id="st-streak">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">📈 Progress</div>
            <div class="stat-val" id="st-pct" style="color:var(--blue)">0%</div>
        </div>
        <button class="mbtn secondary" onclick="testTelegram()">🔔 Test Bot</button>
        <button class="mbtn secondary" style="color:var(--red); margin-top: auto;" onclick="resetAll()">🗑 Reset System</button>
    </aside>
    <main class="main">
        <div class="timeline" id="timeline"></div>
    </main>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal">
        <h2 style="margin-bottom: 20px; font-weight: 900;">COMMIT SPRINT</h2>
        <div class="field"><label>Project Name</label><input type="text" id="f-name" placeholder="Name"></div>
        <div class="field"><label>Project URL (GitHub/Live)</label><input type="text" id="f-link" placeholder="https://..."></div>
        <div class="field"><label>Duration (Days)</label><input type="number" id="f-days" value="1"></div>
        <button class="mbtn primary" onclick="saveProject()">COMMIT & DEPLOY</button>
        <button class="mbtn secondary" onclick="closeModal()">CANCEL</button>
    </div>
</div>

<script>
const TG_TOKEN = "8277776181:AAGrepxdpsYewXz85hIkygGx1Rd1E5FlRBc";
const TG_ID = "6228156468";

let data = JSON.parse(localStorage.getItem('egohurt_v3')) || {};
let currentDayIdx = null;

function getTodayStr() { return new Date().toLocaleDateString('en-GB'); }

async function sendTelegram(msg) {
    const url = `https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown&disable_web_page_preview=false`;
    try { await fetch(url); } catch(e) { console.error("TG Error", e); }
}

function render() {
    const tl = document.getElementById('timeline');
    tl.innerHTML = '';
    const occupied = new Set();
    
    Object.keys(data).forEach(day => {
        for(let i=1; i < data[day].duration; i++) occupied.add(parseInt(day) + i);
    });

    for(let i=1; i<=210; i++) {
        if(occupied.has(i)) continue;
        const box = document.createElement('div');
        box.className = 'day-box' + (data[i] ? ' completed' : '');
        box.style.gridColumn = data[i] ? `span ${Math.min(data[i].duration, 5)}` : 'span 1';
        
        if(data[i]) {
            box.innerHTML = `<span style="font-size:9px; opacity:0.7">PROJECT</span><br><span style="font-size:11px">${data[i].name}</span>`;
            box.onclick = () => { if(data[i].link) window.open(data[i].link, '_blank'); };
        } else {
            box.innerHTML = `DAY ${i}`;
            box.onclick = () => { currentDayIdx = i; document.getElementById('modal').classList.add('active'); };
        }
        tl.appendChild(box);
    }
    updateStats();
}

function updateStats() {
    const keys = Object.keys(data);
    document.getElementById('st-pct').innerText = Math.round((keys.length/210)*100) + '%';
    
    let streak = 0;
    let checkDate = new Date();
    while(true) {
        let s = checkDate.toLocaleDateString('en-GB');
        let found = Object.values(data).some(p => p.date === s);
        if(found) { streak++; checkDate.setDate(checkDate.getDate() - 1); }
        else break;
    }
    document.getElementById('st-streak').innerText = streak;
    return streak;
}

function saveProject() {
    const nameInput = document.getElementById('f-name');
    const linkInput = document.getElementById('f-link');
    const daysInput = document.getElementById('f-days');

    const name = nameInput.value;
    const link = linkInput.value || "No link provided";
    const dur = parseInt(daysInput.value) || 1;

    if (!name) {
        alert("Project Name is required!");
        return;
    }

    const today = getTodayStr();
    data[currentDayIdx] = { name, link, duration: dur, date: today };
    localStorage.setItem('egohurt_v3', JSON.stringify(data));
    
    const streakCount = updateStats();
    
    // Telegram Success Alert
    const msg = `✅ *STREAK MAINTAINED* 🎉\n━━━━━━━━━━━━━━━━━━\n📅 *Date:* ${today}\n🔥 *Current Streak:* ${streakCount} days\n🚀 *Project:* ${name}\n🔗 *Link:* ${link}\n\n💪 Great job! You are staying consistent.\n━━━━━━━━━━━━━━━━━━`;
    sendTelegram(msg);

    // --- NEW: CLEAR INPUTS AFTER COMMIT ---
    nameInput.value = '';
    linkInput.value = '';
    daysInput.value = 1;

    closeModal();
    render();
    triggerAnims(streakCount);
}

// Added this to the open function to ensure a fresh start
function openModal(day) {
    currentDayIdx = day;
    document.getElementById('f-name').value = '';
    document.getElementById('f-link').value = '';
    document.getElementById('f-days').value = 1;
    document.getElementById('modal').classList.add('active');
    document.getElementById('f-name').focus(); // Auto-focus for speed
}

function triggerAnims(s) {
    confetti({particleCount: 150, spread: 70, origin: {y: 0.6}, colors:['#00ed64', '#61dbfb']});
    const imp = document.getElementById('impact');
    const fire = document.getElementById('streak-fire');
    document.getElementById('fire-val').innerText = `STREAK ${s}`;

    gsap.fromTo(imp, {opacity:0, scale:0.5}, {opacity:1, scale:1, duration:0.4, onComplete:() => {
        gsap.to(imp, {opacity:0, scale:2, delay:0.5});
        gsap.fromTo(fire, {opacity:0, y:50}, {opacity:1, y:0, delay:0.6, duration:0.5, onComplete:()=>gsap.to(fire, {opacity:0, scale:0, delay:1.5})});
    }});
}

// 12 AM Failure Check
setInterval(() => {
    const now = new Date();
    if(now.getHours() === 0 && now.getMinutes() === 0 && now.getSeconds() === 0) {
        const today = getTodayStr();
        const done = Object.values(data).some(p => p.date === today);
        if(!done) {
            const streakCount = updateStats();
            const msg = `🚨 *STREAK ALERT* 🚨\n━━━━━━━━━━━━━━━━━━\n❌ *Status:* Streak Broken\n📅 *Date:* ${today}\n🔥 *Previous Streak:* ${streakCount} days\n\n⚠️ You missed your daily goal.\nDon’t stop now — restart and stay consistent!\n\n💡 *Tip:* Small daily progress = Big success\n━━━━━━━━━━━━━━━━━━`;
            sendTelegram(msg);
        }
    }
}, 1000);

function closeModal() { document.getElementById('modal').classList.remove('active'); }
function resetAll() { if(confirm("Wipe everything?")) { data={}; localStorage.clear(); render(); } }
function testTelegram() { sendTelegram("⚡ EgoHurt System: Connection Active!"); alert("Test Sent!"); }

render();
</script>
</body>
</html>
