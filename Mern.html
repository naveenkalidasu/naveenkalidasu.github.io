<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MERN · 210 Days Production Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
:root{--bg:#06060a;--surface:#0c0c14;--surface2:#12121e;--border:#1e1e2e;--border2:#2a2a3e;--green:#00ed64;--blue:#61dbfb;--red:#ff4757;--amber:#ffb84d;--purple:#a78bfa;--text:#f0f0f5;--text2:#8888aa;--text3:#555570;--radius:10px;--shadow:0 8px 32px rgba(0,0,0,0.4)}
[data-theme="light"]{--bg:#f4f4f8;--surface:#ffffff;--surface2:#eeeef2;--border:#dddde4;--border2:#ccccdd;--text:#111118;--text2:#555570;--text3:#8888aa;--shadow:0 8px 32px rgba(0,0,0,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden;transition:background .3s,color .3s}
.app{display:grid;grid-template-columns:280px 1fr;height:100vh}
@media(max-width:900px){.app{grid-template-columns:1fr}}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:24px 16px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
.logo{font-size:1.4rem;font-weight:800;letter-spacing:-0.5px}
.logo span{color:var(--green)}
.progress-wrap{background:var(--surface2);border-radius:var(--radius);padding:16px;border:1px solid var(--border)}
.progress-label{display:flex;justify-content:space-between;font-size:.7rem;color:var(--text2);margin-bottom:8px}
.progress-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));width:0;transition:width .6s ease}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 12px}
.stat-label{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.stat-val{font-size:1.3rem;font-weight:800;font-family:'JetBrains Mono';color:var(--green)}
.stat-val.blue{color:var(--blue)}.stat-val.amber{color:var(--amber)}.stat-val.purple{color:var(--purple)}
.main{padding:28px;overflow-y:auto}
.timeline{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:6px;grid-auto-flow:dense}
.day-box{height:72px;border:1px solid var(--border);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.65rem;color:var(--text3);cursor:pointer;transition:all .2s;background:var(--surface);position:relative}
.day-box:hover{border-color:var(--blue);background:rgba(97,219,251,0.05)}
.merged{border:none!important;font-weight:600;text-align:center;padding:6px;overflow:hidden;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.merged.status-completed{background:linear-gradient(135deg,#00ed64,#00c853);color:#000}
.merged.status-inprogress{background:linear-gradient(135deg,#61dbfb,#2196f3);color:#000}
.merged.status-failed{background:linear-gradient(135deg,#ff4757,#e91e63);color:#fff}
.proj-name{font-size:.7rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90%}
.proj-days{font-size:.55rem;opacity:.7}
.proj-link-btn{position:absolute;top:4px;right:4px;font-size:10px;cursor:pointer;opacity:0.5}
.proj-link-btn:hover{opacity:1}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;justify-content:center;align-items:center;z-index:1000;backdrop-filter:blur(4px)}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;width:400px;box-shadow:var(--shadow)}
.field{margin-bottom:14px}
.field label{display:block;font-size:.65rem;color:var(--text3);text-transform:uppercase;margin-bottom:5px}
.field input, .field select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:6px;outline:none;font-family:'JetBrains Mono'}
.modal-actions{display:flex;gap:8px;margin-top:18px}
.mbtn{flex:1;padding:12px;border-radius:6px;font-weight:700;cursor:pointer;border:none}
.mbtn.primary{background:var(--green);color:#000}.mbtn.secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}.mbtn.danger{background:var(--red);color:#fff}
#impact{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:4rem;font-weight:900;opacity:0;pointer-events:none;z-index:2000;color:var(--green)}
.sbtn{padding:10px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:.75rem;font-weight:600;cursor:pointer;border-radius:var(--radius);text-align:center;margin-top:5px}
.sbtn:hover{border-color:var(--green);color:var(--text)}
</style>
</head>
<body>
<div id="impact">DEPLOYED 🚀</div>
<div class="app">
    <aside class="sidebar">
        <div class="logo">⚡ <span>Ego</span>Hurt</div>
        <div class="progress-wrap">
            <div class="progress-label"><span>COMPLETION</span><span id="st-pct">0%</span></div>
            <div class="progress-bar"><div class="progress-fill" id="st-fill"></div></div>
        </div>
        <div class="stat-grid">
            <div class="stat-card"><div class="stat-label">Projects</div><div class="stat-val" id="st-count">0</div></div>
            <div class="stat-card"><div class="stat-label">Avg Days</div><div class="stat-val blue" id="st-avg">0</div></div>
            <div class="stat-card"><div class="stat-label">Score</div><div class="stat-val amber" id="st-score">0</div></div>
            <div class="stat-card"><div class="stat-label">Target</div><div class="stat-val purple">210</div></div>
        </div>
        <div style="margin-top:auto; display:flex; flex-direction:column; gap:5px">
            <button class="sbtn" onclick="exportJSON()">📤 Export JSON</button>
            <button class="sbtn" onclick="toggleTheme()">🌓 Toggle Theme</button>
            <button class="sbtn" style="color:var(--red)" onclick="resetAll()">🗑 Reset All</button>
        </div>
    </aside>
    <main class="main">
        <h1 style="font-size:1.3rem; margin-bottom:20px">210-Day Production Timeline</h1>
        <div class="timeline" id="timeline"></div>
    </main>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal">
        <h2 id="m-title" style="font-size:1rem; margin-bottom:15px">Commit Sprint</h2>
        <div class="field"><label>Project Name</label><input type="text" id="f-name"></div>
        <div class="field"><label>Link</label><input type="text" id="f-link"></div>
        <div class="field"><label>Days</label><input type="number" id="f-days" min="1"></div>
        <div class="field"><label>Status</label><select id="f-status"><option value="completed">Completed</option><option value="inprogress">In Progress</option><option value="failed">Failed</option></select></div>
        <div class="modal-actions">
            <button class="mbtn secondary" onclick="closeModal()">Cancel</button>
            <button class="mbtn danger" id="btn-del" onclick="deleteItem()">Delete</button>
            <button class="mbtn primary" onclick="saveItem()">Commit</button>
        </div>
    </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem('mern_ego_210')) || {};
let currentDay = null;

function render(){
    const tl = document.getElementById('timeline');
    tl.innerHTML = '';
    const occupied = new Set();
    
    // Track multi-day spans
    Object.keys(data).forEach(start => {
        let d = parseInt(start);
        let len = parseInt(data[start].duration);
        for(let i=1; i<len; i++) occupied.add(d + i);
    });

    for(let i=1; i<=210; i++){
        if(occupied.has(i)) continue; 

        const box = document.createElement('div');
        box.className = 'day-box';
        
        if(data[i]){
            const item = data[i];
            const dur = parseInt(item.duration);
            box.classList.add('merged', 'status-' + item.status);
            box.style.gridColumn = `span ${Math.min(dur, 6)}`; 
            box.innerHTML = `<span class="proj-days">${dur} Days</span><span class="proj-name">${item.name}</span>`;
            if(item.link) {
                const l = document.createElement('span'); l.className='proj-link-btn'; l.innerText='🔗';
                l.onclick=(e)=>{ e.stopPropagation(); window.open(item.link,'_blank'); };
                box.appendChild(l);
            }
            box.onclick = () => openEdit(i);
        } else {
            box.innerText = 'DAY ' + i;
            box.onclick = () => openAdd(i);
        }
        tl.appendChild(box);
    }
    updateStats();
}

function openAdd(day){
    currentDay = day;
    document.getElementById('m-title').innerText = 'Add Sprint: Day ' + day;
    document.getElementById('f-name').value = '';
    document.getElementById('f-link').value = '';
    document.getElementById('f-days').value = 1;
    document.getElementById('btn-del').style.display = 'none';
    document.getElementById('modal').classList.add('active');
}

function openEdit(day){
    currentDay = day;
    const item = data[day];
    document.getElementById('m-title').innerText = 'Edit Sprint: Day ' + day;
    document.getElementById('f-name').value = item.name;
    document.getElementById('f-link').value = item.link;
    document.getElementById('f-days').value = item.duration;
    document.getElementById('f-status').value = item.status;
    document.getElementById('btn-del').style.display = 'block';
    document.getElementById('modal').classList.add('active');
}

function saveItem(){
    const name = document.getElementById('f-name').value;
    const dur = parseInt(document.getElementById('f-days').value) || 1;
    if(!name) return;
    
    data[currentDay] = {
        name, link: document.getElementById('f-link').value,
        duration: dur, status: document.getElementById('f-status').value
    };
    
    if(data[currentDay].status === 'completed') {
        confetti({particleCount:150, spread:70, origin:{y:0.6}, colors:['#00ed64','#61dbfb','#ffffff']});
        gsap.fromTo("#impact", {opacity:0, scale:0.5}, {opacity:1, scale:1, duration:0.4, onComplete:()=>gsap.to("#impact",{opacity:0, scale:1.5, delay:0.5})});
    }

    localStorage.setItem('mern_ego_210', JSON.stringify(data));
    closeModal(); render();
}

function deleteItem(){
    if(confirm('Remove this project?')) {
        delete data[currentDay];
        localStorage.setItem('mern_ego_210', JSON.stringify(data));
        closeModal(); render();
    }
}

function updateStats(){
    const keys = Object.keys(data);
    let totalDays = 0;
    keys.forEach(k => totalDays += parseInt(data[k].duration));
    const pct = Math.round((totalDays/210)*100);
    document.getElementById('st-pct').innerText = pct + '%';
    document.getElementById('st-fill').style.width = pct + '%';
    document.getElementById('st-count').innerText = keys.length;
    document.getElementById('st-avg').innerText = keys.length ? (totalDays/keys.length).toFixed(1) : 0;
    document.getElementById('st-score').innerText = Math.min(100, (keys.length*5) + Math.round(pct/2));
}

function closeModal(){ document.getElementById('modal').classList.remove('active'); }
function toggleTheme(){ 
    const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', t);
}
function exportJSON(){
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(data)], {type:'application/json'}));
    a.download='mern_210_data.json'; a.click();
}
function resetAll(){ if(confirm('Delete all progress?')) { data={}; localStorage.clear(); render(); } }

render();
</script>
</body>
</html>
