<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project-2</title>
    <style>
        .main{
            width: 700px;
            height: 400px;
            line-height: 75px;
            margin: 50px;
            border: 2px solid black;
            border-radius: 16px;
            margin-left: 30%;
        }
        input,button{
            margin:10px;
            border: 1 px solid black;
            border-radius: 16px;
            padding: 10px;
            font-size: 15px;
        }
        button{
            background-color: green;
            color: white;
        }
        .row{
            display: flex;
            gap: 10px;
            margin-left:3% ;
        }
    </style>
</head>
<body>
    <div class="main">
        <h1 style="margin-left: 2%;"> Password Generator</h1>
        <div class="row">
            <input type="number" placeholder="Enter size" id="input">
        <button onclick="generate()">Generate</button>
        </div>
        <h2 id="output"></h2>
    </div>
    <script>
        function generate(){
            let Char="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
            let user=document.getElementById('input').value;
            let Password="";
            for(let i=0;i<user;i++)
        {
            let random=Math.floor(Math.random()*Char.length);
            Password+=Char[random];
        }
        document.getElementById('output').innerText="Password:"+Password;
        }
    </script>
</body>
</html>
